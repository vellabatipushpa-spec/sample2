<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Page Template</title>
    <style>
        /* General Page Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Card Container */
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        /* Interactive Button */
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 15px;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        /* Dynamic Output Area */
        #message-box {
            margin-top: 20px;
            font-weight: bold;
            color: #27ae60;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome!</h1>
        <p>This is a fully standalone, single-file HTML web page.</p>
        
        <!-- Button with an event listener -->
        <button class="btn" id="action-btn">Click Me</button>
        
        <!-- Target container for JavaScript action -->
        <div id="message-box"></div>
    </div>

    <script>
        // DOM Elements
        const button = document.getElementById('action-btn');
        const messageBox = document.getElementById('message-box');

        // Simple click interaction
        button.addEventListener('click', () => {
            messageBox.textContent = "🎉 JavaScript is working perfectly!";
            
            // Optional: reset message after 3 seconds
            setTimeout(() => {
                messageBox.textContent = "";
            }, 3000);
        });
    </script>

</body>
</html>
